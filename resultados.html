<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Licitações - Resultados da Busca</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    header, footer { background-color: #f2f2f2; padding: 10px; margin-bottom: 20px; }
    nav a { margin-right: 15px; text-decoration: none; color: #333; }
    .search-form { background-color: #e9e9e9; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    .search-form label, .search-form input, .search-form select, .search-form button { margin-bottom: 10px; display: block; }
    .search-form input[type=text], .search-form select { padding: 8px; width: 95%; max-width: 400px; }
    .search-form button { padding: 10px 15px; cursor: pointer; }
    .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .results-table th, .results-table td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
    .results-table th { background-color: #f2f2f2; }
    .pagination { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .pagination a { text-decoration: none; padding: 5px 10px; border: 1px solid #ccc; color: #333; border-radius: 4px; }
    .pagination a.active { background-color: #555; color: white; }
    .pagination a.disabled { opacity: 0.5; pointer-events: none; }
    .muted { color: #666; }
    .error { color: #b00020; }
    .badge { display:inline-block; padding: 2px 8px; border: 1px solid #ccc; border-radius: 999px; font-size: 12px; }
  </style>
</head>
<body>

<header>
  <h1>Buscador de Licitações</h1>
  <nav>
    <a href="index.html">Início</a>
    <a href="resultados.html">Buscar Licitações</a>
    <a href="login.html">Login</a>
    <a href="cadastro.html">Cadastro</a>
  </nav>
</header>

<main>
  <h2>Buscar Licitações</h2>

  <div class="search-form">
    <h3>Busca Avançada</h3>
    <form id="searchForm" action="resultados.html" method="get">
      <label for="palavra_chave">Palavra-chave:</label>
      <input type="text" id="palavra_chave" name="palavra_chave" placeholder="Ex: construção, software, consultoria">

      <label for="modalidade">Modalidade:</label>
      <select id="modalidade" name="modalidade">
        <option value="">Todas</option>
        <option value="pregao">Pregão</option>
        <option value="concorrencia">Concorrência</option>
        <option value="tomada">Tomada de Preços</option>
        <option value="convite">Convite</option>
        <option value="leilao">Leilão</option>
        <option value="concurso">Concurso</option>
        <option value="dispensa">Dispensa</option>
        <option value="inexigibilidade">Inexigibilidade</option>
      </select>

      <label for="orgao">Órgão Licitante (Opcional):</label>
      <input type="text" id="orgao" name="orgao" placeholder="Ex: Ministério da Saúde">

      <label for="uf">UF (Opcional):</label>
      <input type="text" id="uf" name="uf" placeholder="Ex: SP, RJ, MG" maxlength="2">

      <!-- mantém page sempre 1 quando fizer nova busca -->
      <input type="hidden" id="page" name="page" value="1">

      <button type="submit">Buscar</button>
    </form>
    <div id="status" class="muted" style="margin-top:8px;"></div>
    <div id="error" class="error" style="margin-top:8px;"></div>
  </div>

  <h3>Resultados da Busca</h3>
  <p id="summary" class="muted">Carregando...</p>

  <table class="results-table">
    <thead>
      <tr>
        <th>Processo</th>
        <th>Órgão Licitante</th>
        <th>Modalidade</th>
        <th>Objeto (Resumo)</th>
        <th>Data Abertura</th>
        <th>Fonte</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="resultsBody">
      <!-- preenchido via JS -->
    </tbody>
  </table>

  <div id="pagination" class="pagination"></div>
</main>

<footer>
  <p>&copy; 2026 Buscador de Licitações. Todos os direitos reservados.</p>
</footer>

<script>
  function qs(name, fallback = "") {
    const p = new URLSearchParams(window.location.search);
    return p.get(name) ?? fallback;
  }

  function setFormFromQuery() {
    const palavra = qs("palavra_chave", "");
    const modalidade = qs("modalidade", "");
    const orgao = qs("orgao", "");
    const uf = (qs("uf", "") || "").toUpperCase();
    const page = qs("page", "1");

    document.getElementById("palavra_chave").value = palavra;
    document.getElementById("modalidade").value = modalidade;
    document.getElementById("orgao").value = orgao;
    document.getElementById("uf").value = uf;
    document.getElementById("page").value = page;
  }

  function formatDateTime(iso) {
    if (!iso) return "-";
    // aceita "YYYY-MM-DD" ou "YYYY-MM-DDTHH:mm:ss"
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return iso;
    return d.toLocaleString("pt-BR");
  }

  function resumoTexto(txt, n = 90) {
    if (!txt) return "-";
    const s = String(txt);
    return s.length > n ? s.slice(0, n).trim() + "..." : s;
  }

  function makeLink(href, text, cls="") {
    const a = document.createElement("a");
    a.href = href;
    a.textContent = text;
    if (cls) a.className = cls;
    return a;
  }

  function renderRows(items) {
    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "";

    if (!items || items.length === 0) {
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.colSpan = 7;
      td.className = "muted";
      td.textContent = "Nenhum resultado encontrado.";
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    for (const it of items) {
      const tr = document.createElement("tr");

      const tdProc = document.createElement("td");
      tdProc.textContent = it.numero_processo || "-";

      const tdOrgao = document.createElement("td");
      tdOrgao.textContent = it.orgao_licitante || "-";

      const tdMod = document.createElement("td");
      tdMod.textContent = it.modalidade || "-";

      const tdObj = document.createElement("td");
      tdObj.textContent = resumoTexto(it.objeto, 120);

      const tdAbert = document.createElement("td");
      tdAbert.textContent = formatDateTime(it.data_abertura_propostas);

      const tdFonte = document.createElement("td");
      const fonte = it.fonte_dados || "-";
      const span = document.createElement("span");
      span.className = "badge";
      span.textContent = fonte;
      tdFonte.appendChild(span);

      const tdAcoes = document.createElement("td");
      tdAcoes.appendChild(makeLink(`detalhes_licitacao.html?id=${encodeURIComponent(it.id)}`, "Ver Detalhes"));

      tr.appendChild(tdProc);
      tr.appendChild(tdOrgao);
      tr.appendChild(tdMod);
      tr.appendChild(tdObj);
      tr.appendChild(tdAbert);
      tr.appendChild(tdFonte);
      tr.appendChild(tdAcoes);

      tbody.appendChild(tr);
    }
  }

  function buildPageUrl(targetPage) {
    const p = new URLSearchParams(window.location.search);
    p.set("page", String(targetPage));
    // garante per_page fixo (opcional)
    // p.set("per_page", "10");
    return `resultados.html?${p.toString()}`;
  }

  function renderPagination(pagination) {
    const el = document.getElementById("pagination");
    el.innerHTML = "";

    const page = pagination?.page ?? 1;
    const total = pagination?.total_pages ?? 1;

    const prev = makeLink(buildPageUrl(Math.max(1, page - 1)), "Anterior");
    if (page <= 1) prev.classList.add("disabled");
    el.appendChild(prev);

    // mostra até 7 páginas com janela
    const windowSize = 7;
    let start = Math.max(1, page - Math.floor(windowSize / 2));
    let end = Math.min(total, start + windowSize - 1);
    start = Math.max(1, end - windowSize + 1);

    for (let i = start; i <= end; i++) {
      const a = makeLink(buildPageUrl(i), String(i));
      if (i === page) a.classList.add("active");
      el.appendChild(a);
    }

    const next = makeLink(buildPageUrl(Math.min(total, page + 1)), "Próxima");
    if (page >= total) next.classList.add("disabled");
    el.appendChild(next);
  }

  async function carregar() {
    document.getElementById("error").textContent = "";
    document.getElementById("status").textContent = "Consultando a API...";
    document.getElementById("summary").textContent = "Carregando...";

    const palavra = qs("palavra_chave", "");
    const modalidade = qs("modalidade", "");
    const orgao = qs("orgao", "");
    const uf = (qs("uf", "") || "").toUpperCase();
    const page = parseInt(qs("page", "1"), 10) || 1;
    const perPage = parseInt(qs("per_page", "10"), 10) || 10;

    const apiParams = new URLSearchParams();
    if (palavra) apiParams.set("palavra_chave", palavra);
    if (modalidade) apiParams.set("modalidade", modalidade);
    if (orgao) apiParams.set("orgao", orgao);
    if (uf) apiParams.set("uf", uf);
    apiParams.set("page", String(page));
    apiParams.set("per_page", String(perPage));

    const url = `/api/licitacoes/buscar?${apiParams.toString()}`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data?.error || "Erro ao buscar licitações.");
      }

      renderRows(data.resultados || []);

      const totalItems = data?.pagination?.total_items ?? 0;
      const totalPages = data?.pagination?.total_pages ?? 1;

      const termo = palavra || modalidade || orgao || uf ? (palavra || modalidade || orgao || uf) : "todos";
      document.getElementById("summary").textContent =
        `Exibindo ${totalItems} resultado(s) para "${termo}" (página ${page} de ${totalPages}).`;

      renderPagination(data.pagination);

      document.getElementById("status").textContent = `OK: ${totalItems} encontrado(s).`;
    } catch (e) {
      document.getElementById("error").textContent = String(e?.message || e);
      document.getElementById("status").textContent = "";
      renderRows([]);
      renderPagination({ page: 1, total_pages: 1 });
      document.getElementById("summary").textContent = "Não foi possível carregar os resultados.";
    }
  }

  // Quando enviar o formulário, zera page pra 1
  document.getElementById("searchForm").addEventListener("submit", function () {
    document.getElementById("page").value = "1";
  });

  setFormFromQuery();
  carregar();
</script>

</body>
</html>
