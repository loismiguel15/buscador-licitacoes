<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Licitações - Login</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        header, footer { background-color: #f2f2f2; padding: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        .login-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .login-container h2 { text-align: center; margin-bottom: 20px; }
        .login-container label { display: block; margin-bottom: 5px; }
        .login-container input[type=email], .login-container input[type=password] { width: 95%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 3px; }
        .login-container button { width: 100%; padding: 10px 15px; background-color: #5cb85c; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 16px; }
        .login-container button:hover { background-color: #4cae4c; }
        .login-container p { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <h1>Buscador de Licitações</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="resultados.html">Buscar Licitações</a>
            <a href="login.html">Login</a>
            <a href="cadastro.html">Cadastro</a>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <h2>Acessar Conta</h2>
            <form action="#" method="post"> <!-- Ação será definida pelo backend -->
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>

                <button type="submit">Entrar</button>
            </form>
            <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            <!-- Adicionar link para "Esqueci minha senha" se necessário -->
        </div>
    </main>

    <footer style="position: fixed; bottom: 0; width: calc(100% - 40px);">
        <p>&copy; 2025 Buscador de Licitações. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
